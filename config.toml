library_tabs = ["playlists", "albums","podcasts", "browse"]

[theme]                       # Catppuccin Mocha — swap hexes to taste
background = "#1e1e2e"
primary = "#cdd6f4"
secondary = "#a6adc8"
title = "#cba6f7"
playing = "#a6e3a1"
playing_selected = "#94e2d5"
playing_bg = "#1e1e2e"
highlight = "#cdd6f4"         # selected row text
highlight_bg = "#313244"      # selected row background
error = "#f38ba8"
error_bg = "#1e1e2e"
statusbar = "#a6e3a1"
statusbar_progress = "#cba6f7"
statusbar_bg = "#313244"
cmdline = "#cdd6f4"
cmdline_bg = "#1e1e2e"
search_match = "#f9e2af"

[keybindings]
# vim navigation
"j" = "move down 1"
"k" = "move up 1"
"h" = "move left 1"
"l" = "move right 1"
"Ctrl+d" = "move pagedown 0.5"
"Ctrl+u" = "move pageup 0.5"
"Ctrl+f" = "move pagedown 1"
"Ctrl+b" = "move pageup 1"
"g" = "move up 100000"          # jump to top (cheap gg)
"Shift+g" = "move down 100000"  # jump to bottom
# track control
"Shift+h" = "previous"
"Shift+l" = "next"
"Ctrl+a" = "add"
"Alt+a" = "add current"



